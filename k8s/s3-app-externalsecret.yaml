apiVersion: external-secrets.io/v1alpha1
kind: ClusterPushSecret
metadata:
  name: skirmshop-drive-s3-app
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: s3-credentials
spec:
  pushSecretName: skirmshop-drive-s3-app-to-vault
  namespaceSelectors:
    - matchLabels:
        kubernetes.io/metadata.name: backup-hub
  refreshTime: 1h
  pushSecretSpec:
    refreshInterval: 1h
    updatePolicy: Replace
    deletionPolicy: None
    selector:
      secret:
        name: skirmshop-drive-s3-app
    secretStoreRefs:
      - name: vault-backend
        kind: ClusterSecretStore
    data:
      - match:
          secretKey: AWS_ACCESS_KEY_ID
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: AWS_ACCESS_KEY_ID
      - match:
          secretKey: AWS_SECRET_ACCESS_KEY
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: AWS_SECRET_ACCESS_KEY
      - match:
          secretKey: AWS_REGION
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: AWS_REGION
      - match:
          secretKey: AWS_S3_FORCE_PATH_STYLE
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: AWS_S3_FORCE_PATH_STYLE
      - match:
          secretKey: S3_BUCKET
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: S3_BUCKET
      - match:
          secretKey: S3_ENDPOINT
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: S3_ENDPOINT
      - match:
          secretKey: S3_REGION
          remoteRef:
            remoteKey: secret/skirmshop-drive/s3-app
            property: S3_REGION
---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: skirmshop-drive-s3-app
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: s3-credentials
spec:
  externalSecretName: skirmshop-drive-s3-app
  namespaces:
    - skirmshop
    - whatsapp-mcp
    - skirmshop-brain-prod
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: skirmshop-drive-s3-app
      creationPolicy: Orphan
      deletionPolicy: Retain
      template:
        metadata:
          labels:
            app.kubernetes.io/name: skirmshop-drive-mirror
            app.kubernetes.io/component: s3-credentials
    data:
      - secretKey: AWS_ACCESS_KEY_ID
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: AWS_ACCESS_KEY_ID
          decodingStrategy: None
      - secretKey: AWS_SECRET_ACCESS_KEY
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: AWS_SECRET_ACCESS_KEY
          decodingStrategy: None
      - secretKey: AWS_REGION
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: AWS_REGION
          decodingStrategy: None
      - secretKey: AWS_S3_FORCE_PATH_STYLE
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: AWS_S3_FORCE_PATH_STYLE
          decodingStrategy: None
      - secretKey: S3_BUCKET
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: S3_BUCKET
          decodingStrategy: None
      - secretKey: S3_ENDPOINT
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: S3_ENDPOINT
          decodingStrategy: None
      - secretKey: S3_REGION
        remoteRef:
          key: secret/skirmshop-drive/s3-app
          property: S3_REGION
          decodingStrategy: None
