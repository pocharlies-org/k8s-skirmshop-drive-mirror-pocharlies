apiVersion: apps/v1
kind: Deployment
metadata:
  name: skirmshop-drive-s3
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: s3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skirmshop-drive-mirror
      app.kubernetes.io/component: s3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skirmshop-drive-mirror
        app.kubernetes.io/component: s3
      annotations:
        backup.velero.io/backup-volumes-excludes: data
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: ubuntu
        topology: lan
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --address
            - :9000
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: skirmshop-drive-s3-root
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skirmshop-drive-s3-root
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BROWSER_REDIRECT_URL
              value: https://skirmshop-s3-console.lan.e-dani.com
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: s3-data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: skirmshop-drive-mirror
---
apiVersion: v1
kind: Service
metadata:
  name: skirmshop-drive-s3
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: s3
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: s3
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
