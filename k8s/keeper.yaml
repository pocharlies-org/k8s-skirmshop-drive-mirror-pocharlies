apiVersion: apps/v1
kind: Deployment
metadata:
  name: skirmshop-drive-mirror-keeper
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: keeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skirmshop-drive-mirror
      app.kubernetes.io/component: keeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skirmshop-drive-mirror
        app.kubernetes.io/component: keeper
      annotations:
        backup.velero.io/backup-volumes: mirror
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: ubuntu
        topology: lan
      containers:
        - name: keeper
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ec", "mkdir -p /mirror/current /mirror/archive /mirror/logs /mirror/manifests /mirror/s3-data /mirror/s3-sync-logs /mirror/s3-sync-manifests && chmod 0777 /mirror/s3-data /mirror/s3-sync-logs /mirror/s3-sync-manifests && sleep infinity"]
          volumeMounts:
            - name: mirror
              mountPath: /mirror
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
      volumes:
        - name: mirror
          persistentVolumeClaim:
            claimName: skirmshop-drive-mirror
