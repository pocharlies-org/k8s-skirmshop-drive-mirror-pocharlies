apiVersion: batch/v1
kind: CronJob
metadata:
  name: skirmshop-drive-mirror
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: sync
spec:
  schedule: "10 3 * * *"
  timeZone: Europe/Madrid
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 21600
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: skirmshop-drive-mirror
            app.kubernetes.io/component: sync
          annotations:
            backup.velero.io/backup-volumes-excludes: mirror,rclone-config,google-token,scripts
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
            kubernetes.io/hostname: ubuntu
            topology: lan
          containers:
            - name: rclone
              image: rclone/rclone:1.69.0
              imagePullPolicy: IfNotPresent
              command: ["sh", "/app/drive-sync.sh"]
              envFrom:
                - configMapRef:
                    name: skirmshop-drive-mirror-config
              volumeMounts:
                - name: scripts
                  mountPath: /app/drive-sync.sh
                  subPath: drive-sync.sh
                  readOnly: true
                - name: google-token
                  mountPath: /var/run/google
                  readOnly: true
                - name: mirror
                  mountPath: /mirror
                - name: rclone-config
                  mountPath: /config/rclone
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: scripts
              configMap:
                name: skirmshop-drive-mirror-scripts
                defaultMode: 0755
            - name: google-token
              secret:
                secretName: gmail-backup-secrets
                items:
                  - key: GMAIL_TOKEN_JSON
                    path: token.json
            - name: mirror
              persistentVolumeClaim:
                claimName: skirmshop-drive-mirror
            - name: rclone-config
              emptyDir: {}
