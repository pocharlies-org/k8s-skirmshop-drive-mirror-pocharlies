apiVersion: batch/v1
kind: Job
metadata:
  name: skirmshop-drive-s3-bootstrap
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
  labels:
    app.kubernetes.io/name: skirmshop-drive-mirror
    app.kubernetes.io/component: s3-bootstrap
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skirmshop-drive-mirror
        app.kubernetes.io/component: s3-bootstrap
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: ubuntu
        topology: lan
      containers:
        - name: mc
          # RELEASE.2025-04-16 broke against MinIO server 2025-04-22 ("Content-Length"
          # error on `mc anonymous set`) — pinned to the mc that passed the full
          # bootstrap incl. ilm import on 2026-07-06.
          image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until mc alias set local "${S3_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                echo "waiting for MinIO..."
                sleep 5
              done

              mc mb --ignore-existing "local/${S3_BUCKET}"
              mc anonymous set none "local/${S3_BUCKET}"

              mc admin policy create local skirmshop-drive-rw /config/s3-policy.json || true
              mc admin user add local "${AWS_ACCESS_KEY_ID}" "${AWS_SECRET_ACCESS_KEY}" || true
              mc admin policy attach local skirmshop-drive-rw --user "${AWS_ACCESS_KEY_ID}"
              mc admin user info local "${AWS_ACCESS_KEY_ID}"

              mc ilm rule import "local/${S3_BUCKET}" < /config/s3-lifecycle.json
              mc ilm rule list --expiry "local/${S3_BUCKET}"
          envFrom:
            - configMapRef:
                name: skirmshop-drive-s3-config
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: skirmshop-drive-s3-root
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skirmshop-drive-s3-root
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: skirmshop-drive-s3-app
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: skirmshop-drive-s3-app
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: policy
              mountPath: /config/s3-policy.json
              subPath: s3-policy.json
              readOnly: true
            - name: policy
              mountPath: /config/s3-lifecycle.json
              subPath: s3-lifecycle.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: policy
          configMap:
            name: skirmshop-drive-s3-policy
